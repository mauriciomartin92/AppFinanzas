<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanzasApp">
<link rel="manifest" href="manifest.json">
<title>FinanzasApp — Mauri & Sofi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1a0f;--bg2:#142016;--bg3:#1c2d1e;--bg4:#243227;
  --green:#4ade80;--green2:#22c55e;
  --text:#e8ffe0;--muted:#7daa88;--border:rgba(74,222,128,.12);
  --red:#f87171;--amber:#fbbf24;--blue:#60a5fa;
  --teal:#2dd4bf;--purple:#a78bfa;--pink:#f472b6;--orange:#fb923c;
  --radius:14px;--nav-h:72px;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',system-ui,sans-serif;
  max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + 48px)}
input,select,button,textarea{font-family:inherit}

/* SETUP */
.setup-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;gap:20px}
.setup-logo{font-size:48px;line-height:1}
.setup-title{font-size:22px;font-weight:800;color:var(--green);letter-spacing:-.5px}
.setup-sub{font-size:14px;color:var(--muted);text-align:center;max-width:320px;line-height:1.6}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;width:100%;display:flex;flex-direction:column;gap:14px}
.setup-card .step{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.setup-card p{font-size:13px;color:var(--muted);line-height:1.5}
.setup-card code{font-size:12px;background:var(--bg3);color:var(--teal);padding:2px 6px;border-radius:5px}

/* LOADING */
.loading{min-height:60vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;
  padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;
  pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.toast.ok{background:#0d2e18;color:var(--green);border:1px solid rgba(74,222,128,.5);box-shadow:0 4px 20px rgba(0,0,0,.7)}
.toast.err{background:#2e0d0d;color:#fca5a5;border:1px solid rgba(248,113,113,.5);box-shadow:0 4px 20px rgba(0,0,0,.7)}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 14px;background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;gap:8px}
.hdr-center{text-align:center;flex:1;min-width:0}
.hdr-appname{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1.5px;opacity:.8}
.hdr-bal{font-size:22px;font-weight:800;letter-spacing:-1px;line-height:1.1}
.hdr-bal.pos{color:var(--green)}.hdr-bal.neg{color:var(--red)}
.hdr-debt{font-size:11px;color:var(--amber);margin-top:1px}
.hdr-sync{font-size:10px;color:var(--muted);margin-top:1px}
.icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:15px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:active{transform:scale(.95)}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;height:var(--nav-h);padding-bottom:8px;z-index:100}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;gap:3px;color:var(--muted);font-size:10px;
  letter-spacing:.3px;transition:all .2s}
.nbtn.active{color:var(--green)}
.ni{font-size:18px;line-height:1}
.nbtn.special .ni{background:var(--green);color:#0d1a0f;width:44px;height:44px;
  border-radius:50%;font-size:24px;font-weight:800;display:flex;align-items:center;
  justify-content:center;margin-bottom:2px}

/* CONTENT */
.content{padding:16px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 40px);
  display:flex;flex-direction:column;gap:12px}
.stitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:2px;margin-top:4px}
.stitle2{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.6px;padding:6px 0 2px}
  
.stitle3 {
  font-size: 21px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 6px 0 2px;
  display: inline-block;
  
  /* Nuevas propiedades */
  color: #2ecc71; /* Un tono de verde vibrante (podés cambiarlo por 'green' u otro hex) */
  -webkit-text-stroke: 1px black; /* Grosor y color del borde */
}

/* METRIC CARDS */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.mc.wide{grid-column:1/-1;text-align:center}
.mlabel{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.mval{font-size:17px;font-weight:800;letter-spacing:-.5px}
.mval.lg{font-size:24px;letter-spacing:-1px}
.mval.g{color:var(--green)}.mval.r{color:var(--red)}.mval.t{color:var(--teal)}.mval.a{color:var(--amber)}

/* BALANCE CARD */
.balcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.baltitle{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.balrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.balrow:last-of-type{border-bottom:none}
.avt{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.avt.m{background:rgba(96,165,250,.18);color:var(--blue)}
.avt.s{background:rgba(244,114,182,.18);color:var(--pink)}
.balinfo{flex:1;display:flex;justify-content:space-between;align-items:center}
.balname{font-size:13px}
.balamt{font-size:15px;font-weight:800}
.balamt.g{color:var(--green)}.balamt.r{color:var(--red)}
.debtsummary{text-align:center;margin-top:10px;font-size:13px;
  padding:8px 12px;background:var(--bg3);border-radius:8px;color:var(--muted);line-height:1.6}
.debtsummary strong{color:var(--text)}

/* CHART */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;display:flex;align-items:center;justify-content:center;
  position:relative;min-height:220px}
.chart-center{position:absolute;text-align:center;pointer-events:none}
.chart-total{font-size:18px;font-weight:800;color:var(--text)}
.chart-lbl{font-size:11px;color:var(--muted)}

/* LEGEND */
.legend{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.lgitem{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)}
.lgitem:last-child{border-bottom:none}
.lgdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.lgname{flex:1;font-size:13px}
.lgpct{font-size:12px;color:var(--muted);min-width:32px;text-align:right}
.lgamt{font-size:13px;font-weight:700;min-width:90px;text-align:right}

/* SALDAR BADGE */
.saldar-btn{display:inline-flex;align-items:center;padding:3px 10px;background:rgba(251,191,36,.12);
  border:1px solid rgba(251,191,36,.35);border-radius:20px;color:var(--amber);
  font-size:11px;font-weight:700;cursor:pointer;margin-left:8px;vertical-align:middle}

/* FORMS */
.fsec{display:flex;flex-direction:column;gap:12px}
.fgrp{display:flex;flex-direction:column;gap:5px}
.flabel{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.3px}
.finput{background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:12px 14px;border-radius:10px;font-size:16px;outline:none;width:100%;transition:border-color .2s}
.finput:focus{border-color:var(--green)}
.fselect{background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:12px 14px;border-radius:10px;font-size:15px;outline:none;width:100%;cursor:pointer}
.btnprimary{background:var(--green);color:#0d1a0f;border:none;padding:14px;
  border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;width:100%;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btnprimary:active{transform:scale(.98);opacity:.9}
.btnprimary:disabled{opacity:.5;cursor:not-allowed}
.btnsec{background:var(--bg3);color:var(--muted);border:1px solid var(--border);padding:12px;
  border-radius:12px;font-size:14px;cursor:pointer;width:100%;transition:all .2s}
.btnsec:active{transform:scale(.98)}

/* CHIPS */
.chip-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.chip{padding:8px 14px;background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);border-radius:30px;cursor:pointer;font-size:13px;transition:all .18s;white-space:nowrap}
.chip.active{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green);font-weight:700}
.chip.ctx{padding:12px 8px;flex:1;text-align:center;border-radius:12px;font-size:13px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:4px}
.chip.ctx .icon{font-size:20px;line-height:1}
.chip.ctx.active{background:rgba(74,222,128,.13);border-color:var(--green);color:var(--green)}
.reveal{animation:revealDown .2s ease forwards}
@keyframes revealDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.reg-section{display:flex;flex-direction:column;gap:7px}
.sep{height:1px;background:var(--border);margin:2px 0}
.amt-row{display:flex;gap:8px}
.amt-row .finput:first-child{flex:2}
.amt-row .finput:last-child{flex:1.3}
.check-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.check-row input[type=checkbox]{accent-color:var(--green);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.check-row label{font-size:13px;color:var(--muted);cursor:pointer}

/* HISTORY */
.filtrow{display:flex;gap:6px}
.filtbtn{flex:1;padding:8px 4px;background:var(--bg2);border:1px solid var(--border);
  color:var(--muted);border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s}
.filtbtn.active{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green)}
.txnitem{background:var(--bg2);border-radius:12px;overflow:hidden;padding:12px 14px}
.txnmain{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.txninfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.txncat{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txndesc{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txnmeta{font-size:11px;color:var(--muted);line-height:1.5}
.txnright{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.txnamt{font-size:15px;font-weight:800}
.txnamt.g{color:var(--green)}.txnamt.r{color:var(--red)}.txnamt.t{color:var(--teal)}
.delbtn{background:rgba(248,113,113,.1);border:none;color:var(--red);width:26px;height:26px;
  border-radius:6px;cursor:pointer;font-size:11px;transition:all .2s}
.delbtn:active{transform:scale(.9)}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}

/* CATEGORIES */
.addcatform{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column;gap:10px}
.catitem{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:10px;padding:12px 14px}
.catdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.catname{flex:1;font-size:14px}
.catbadge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;flex-shrink:0}
.catbadge.gasto{background:rgba(248,113,113,.15);color:var(--red)}
.catbadge.ingreso{background:rgba(74,222,128,.15);color:var(--green)}
.catused{font-size:11px;color:var(--muted)}
.caticon{font-size:16px;line-height:1;min-width:20px;text-align:center}

/* EMOJI PICKER */
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.emoji-btn{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;
  justify-content:center;transition:all .15s}
.emoji-btn.active{border-color:var(--green);background:rgba(74,222,128,.15)}
.emoji-preview{font-size:28px;line-height:1;text-align:center;padding:4px}

/* SALARIES */
.pctbar{display:flex;height:38px;border-radius:10px;overflow:hidden;gap:2px;margin-bottom:4px}
.pctfill{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;
  border-radius:8px;transition:width .6s ease;min-width:0;overflow:hidden}
.pctfill span{white-space:nowrap;padding:0 6px}
.pctfill.m{background:rgba(96,165,250,.25);color:var(--blue)}
.pctfill.s{background:rgba(244,114,182,.25);color:var(--pink)}
.salform{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column;gap:12px}
.salitem{background:var(--bg2);border-radius:12px;padding:12px 16px;display:flex;flex-direction:column;gap:4px}
.saldate{font-size:11px;color:var(--muted)}
.salusers{display:flex;gap:16px}
.saluser{font-size:14px;font-weight:700}
.m-text{color:var(--blue)}.s-text{color:var(--pink)}
.saltotal{font-size:12px;color:var(--muted)}

/* SETTINGS */
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;display:flex;flex-direction:column;gap:10px}
.info-box{background:rgba(74,222,128,.06);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.5}
.info-box strong{color:var(--text)}

/* COMPENSAR MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;
  padding:20px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px}
.modal-title{font-size:16px;font-weight:700}
.modal-sub{font-size:13px;color:var(--muted)}

/* PWA INSTALL BANNER */
.pwa-banner{display:none;position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;
  transform:translateX(-50%);z-index:150;width:calc(100% - 32px);max-width:440px;
  background:#142016;border:1px solid rgba(74,222,128,.35);border-radius:var(--radius);
  padding:12px 16px;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.pwa-banner.show{display:flex}
.pwa-banner-icon{font-size:28px;line-height:1;flex-shrink:0}
.pwa-banner-text{flex:1;display:flex;flex-direction:column;gap:2px}
.pwa-banner-title{font-size:13px;font-weight:700;color:var(--text)}
.pwa-banner-sub{font-size:11px;color:var(--muted)}
.pwa-install-btn{background:var(--green);color:#0d1a0f;border:none;padding:8px 14px;
  border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pwa-close-btn{background:none;border:none;color:var(--muted);font-size:18px;
  cursor:pointer;padding:0 0 0 4px;flex-shrink:0;line-height:1}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="pwa-banner" class="pwa-banner">
  <div class="pwa-banner-icon">💚</div>
  <div class="pwa-banner-text">
    <span class="pwa-banner-title">Instalar FinanzasApp</span>
    <span class="pwa-banner-sub">Accedé desde tu pantalla de inicio</span>
  </div>
  <button class="pwa-install-btn" onclick="pwaInstall()">Instalar</button>
  <button class="pwa-close-btn" onclick="pwaDismiss()">✕</button>
</div>
<div id="modal-root"></div>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const CHART_COLORS=['#4ade80','#60a5fa','#f87171','#a78bfa','#fb923c','#fbbf24','#2dd4bf','#f472b6'];
const EMOJIS=['🛒','🍕','🚗','🏠','💊','📚','🎉','👕','💡','📱','✈️','🎬','🏋️','🐾','☕','🍺',
              '💈','🔧','🛠️','🧾','📦','💰','🏦','🏡','🌿','🎁','👶','🎓','🏥','⚡','💧','🧹',
              '🛵','🚌','🅿️','🏊','🎭','🖥️','📷','🍷','🧴','🌞','❄️','🔑','📋','💼','🤝'];

let sb=null, cats=[], grupos=[], txns=[], sals=[], lastSync=null, loading=false;

const ST={
  reportMes:null, reportCtx:'domestico', reportCat:'todas',
  showAllCats:false,
  catFormCtx:'domestico', catFormType:'gasto', catFormIcon:'🛒', catFormParent:null,
  tab:'dashboard', filterCtx:'all',
  form:{ctx:null,user:null,vmType:'gasto',catId:null},
};

function initSupabase(url,key){
  try{ sb=window.supabase.createClient(url,key); return true; }catch(e){ return false; }
}

/* ── SUPABASE CRUD ── */
async function seedVMCats(){
  const defaults=[
    {name:'Alquiler VM',type:'ingreso',ctx:'villamartin',color:'🏠'},
    {name:'Mantenimiento',type:'gasto',ctx:'villamartin',color:'🔧'},
    {name:'Impuestos',type:'gasto',ctx:'villamartin',color:'🧾'},
    {name:'Reparaciones',type:'gasto',ctx:'villamartin',color:'🛠️'},
    {name:'Otros VM',type:'gasto',ctx:'villamartin',color:'📦'},
  ];
  try{const{data,error}=await sb.from('subcategorias').insert(defaults).select();
    if(!error&&data) cats=cats.concat(data);}catch(e){console.warn(e);}
}

async function loadAll(){
  loading=true; render();
  try{
    const[c,g,t,s]=await Promise.all([
      sb.from('subcategorias').select('*').order('id'),
      sb.from('categoria').select('*').order('id'),
      sb.from('movimientos').select('*').lte('date', today()).order('date',{ascending:false}),
      sb.from('sueldos').select('*').order('date',{ascending:false}),
    ]);
    if(c.error)throw c.error; if(g.error)throw g.error; if(t.error)throw t.error; if(s.error)throw s.error;
    cats=c.data; grupos=g.data; txns=t.data.filter(function(x){return x.date<=today();}); sals=s.data; lastSync=new Date();
    if(!cats.some(x=>x.ctx==='villamartin')) await seedVMCats();
    loading=false; render();
  }catch(e){
    loading=false;
    const msg=e.message||'';
    if(msg.toLowerCase().match(/api|key|jwt|invalid|unauthorized|401/)){
      localStorage.removeItem('sb_url'); localStorage.removeItem('sb_key'); sb=null;
      document.getElementById('root').innerHTML=renderSetup('❌ Credenciales inválidas. Revisá la URL y la API Key.');
    } else {
      document.getElementById('root').innerHTML=renderError(msg);
    }
  }
}

async function insertTxn(row){const{data,error}=await sb.from('movimientos').insert(row).select().single();if(error)throw error;txns.unshift(data);}
async function deleteTxn(id){const{error}=await sb.from('movimientos').delete().eq('id',id);if(error)throw error;txns=txns.filter(t=>t.id!==id);}
async function insertSal(row){const{data,error}=await sb.from('sueldos').insert(row).select().single();if(error)throw error;sals.unshift(data);}
async function insertCat(row){const{data,error}=await sb.from('subcategorias').insert(row).select().single();if(error)throw error;cats.push(data);}
async function deleteCat(id){const{error}=await sb.from('subcategorias').delete().eq('id',id);if(error)throw error;cats=cats.filter(c=>c.id!==id);}

/* ── CALCULATIONS ── */
function currentPcts(){
  if(!sals.length)return{m:50,s:50};
  const last=[...sals].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const tot=last.m+last.s; if(!tot)return{m:50,s:50};
  const m=Math.round((last.m/tot)*100); return{m,s:100-m};
}

function calcDom(){
  const t=txns.filter(x=>x.ctx==='domestico');
  let mAp=0,sAp=0,mDeb=0,sDeb=0,ing=0,gas=0,ef=0,gasInd=0,mInd=0,sInd=0;
  t.forEach(x=>{
    if(x.type==='compensacion'){
      if(x.usuario==='Mauricio'){
        // Mauricio is the debtor — paying Sofia
        mAp+=Number(x.amt);   // his aporte increases
        sDeb-=Number(x.amt);  // Sofia's required share decreases (she receives payment)
      } else {
        // Sofia is the debtor — paying Mauricio
        sAp+=Number(x.amt);   // her aporte increases
        mDeb+=Number(x.amt);  // Mauricio's required share increases (balances out his surplus)
      }
    } else if(x.type==='gasto'){
      gas+=Number(x.amt);
      x.usuario==='Mauricio'?mAp+=Number(x.amt):sAp+=Number(x.amt);
      mDeb+=Number(x.amt)*(Number(x.p_m)/100);
      sDeb+=Number(x.amt)*(Number(x.p_s)/100);
      const c=cats.find(c=>c.id===x.cat_id);
      if(c&&(c.name==='Fondo Emergencia'||c.name==='Ahorros'))ef+=Number(x.amt);
      if(Number(x.p_m)===100) mInd+=Number(x.amt);
      else if(Number(x.p_s)===100) sInd+=Number(x.amt);
      if(Number(x.p_m)===100||Number(x.p_s)===100) gasInd+=Number(x.amt);
    } else { ing+=Number(x.amt); }
  });
  return{ing,gas,bal:ing-gas,mBal:mAp-mDeb,sBal:sAp-sDeb,mAp,sAp,mDeb,sDeb,ef,gasInd,mInd,sInd};
}

function calcVM(){
  const t=txns.filter(x=>x.ctx==='villamartin');
  let ing=0,gas=0;
  t.forEach(x=>{const a=Number(x.amt);x.type==='ingreso'?ing+=a:gas+=a;});
  return{ing,gas,ahorros:ing-gas};
}

function gasByCat(ctx){
  const mes=today().substring(0,7);
  const gbc=txns.filter(x=>x.type==='gasto'&&x.ctx===ctx&&x.date.startsWith(mes))
    .reduce((acc,x)=>{
      const c=cats.find(c=>c.id===x.cat_id);
      const k=c?c.name:'Sin categoría';
      if(!acc[k])acc[k]={total:0};
      acc[k].total+=Number(x.amt);
      return acc;
    },{});
  Object.keys(gbc).forEach((k,i)=>{gbc[k].color=CHART_COLORS[i%CHART_COLORS.length];});
  return gbc;
}

const today=()=>{const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().split('T')[0];};

function renderCharts(){
  if(window._chartDom) window._chartDom.destroy();
  if(window._chartVM)  window._chartVM.destroy();
  function mk(id,gbc){
    const el=document.getElementById(id); if(!el)return null;
    const lbls=Object.keys(gbc),data=lbls.map(l=>gbc[l].total),colors=lbls.map(l=>gbc[l].color);
    return new Chart(el,{type:'doughnut',
      data:{labels:lbls,datasets:[{data:data.length?data:[1],
        backgroundColor:data.length?colors:['#1c2d1e'],borderWidth:0,hoverOffset:4}]},
      options:{responsive:false,cutout:'68%',
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmt(c.raw)}`}}}}});
  }
  window._chartDom=mk('donutDom',gasByCat('domestico'));
  window._chartVM=mk('donutVM',gasByCat('villamartin'));
}

/* ── COMPENSAR MODAL ── */
function abrirCompensar(deudor,monto){
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" onclick="cerrarModal(event)">
      <div class="modal">
        <div class="modal-title">Saldar deuda de ${deudor}</div>
        <div class="modal-sub">Deuda actual: <strong>${fmt(monto)}</strong></div>
        <div class="fgrp"><div class="flabel">Monto a saldar ($)</div>
          <input class="finput" id="compAmt" type="number" value="${Math.round(monto)}" inputmode="numeric"></div>
        <button class="btnprimary" onclick="confirmarCompensar('${deudor}')">Confirmar pago</button>
        <button class="btnsec" onclick="document.getElementById('modal-root').innerHTML=''">Cancelar</button>
      </div>
    </div>`;
}
function cerrarModal(e){if(e.target===e.currentTarget)document.getElementById('modal-root').innerHTML='';}
async function confirmarCompensar(deudor){
  const amt=parseFloat(document.getElementById('compAmt').value);
  if(!amt||amt<=0){toast('Ingresá un monto','err');return;}
  try{
    await insertTxn({cat_id:null,amt,date:today(),descr:'Compensación de saldos',
      type:'compensacion',ctx:'domestico',usuario:deudor,p_m:0,p_s:0});
    document.getElementById('modal-root').innerHTML='';
    toast('✓ Deuda compensada');
    render();
  }catch(e){toast('Error: '+e.message,'err');}
}

function getCatsForForm(){
  const f=ST.form;
  if(f.ctx==='villamartin'){
    const type=f.vmType==='ingreso'?'ingreso':'gasto';
    const r=cats.filter(c=>c.ctx==='villamartin'&&c.type===type);
    return r.length?r:cats.filter(c=>c.ctx==='villamartin');
  }
  return cats.filter(c=>c.ctx==='domestico'&&c.type==='gasto');
}

function onMontosChange(el){
  var wrap=document.getElementById('montosWrap');
  if(!wrap)return;
  if(el.checked){
    wrap.style.display='flex';
    // Disable other checkboxes
    var f5=document.getElementById('f5050'); if(f5)f5.checked=false;
    var fm=document.getElementById('fManual'); if(fm){fm.checked=false;onManualChange(fm);}
    var mx=document.getElementById('fMixto'); if(mx){mx.checked=false;onMixtoChange(mx);}
    syncMontos();
  } else {
    wrap.style.display='none';
    var msg=document.getElementById('montosTotalMsg'); if(msg)msg.textContent='';
    // Restore fAmt input
    var fAmt=document.getElementById('fAmt'); if(fAmt)fAmt.disabled=false;
  }
}
function syncMontos(){
  var mEl=document.getElementById('fAmtM');
  var sEl=document.getElementById('fAmtS');
  var msg=document.getElementById('montosTotalMsg');
  var fAmt=document.getElementById('fAmt');
  if(!mEl||!sEl)return;
  var m=parseFloat(mEl.value)||0;
  var s=parseFloat(sEl.value)||0;
  var tot=m+s;
  if(msg){
    if(tot>0){
      msg.textContent='Total: '+new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(tot);
      msg.style.color='var(--green)';
    } else {
      msg.textContent='';
    }
  }
  // Auto-fill the main amount field
  if(fAmt&&tot>0){fAmt.value=tot;fAmt.disabled=true;}
  else if(fAmt){fAmt.disabled=false;}
}

function onMixtoChange(el){
  var wrap=document.getElementById('mixtoWrap');
  if(!wrap)return;
  if(el.checked){
    wrap.style.display='flex';
    // Disable other checkboxes
    var f5=document.getElementById('f5050'); if(f5)f5.checked=false;
    var fm=document.getElementById('fManual'); if(fm){fm.checked=false;onManualChange(fm);}
    var fmo=document.getElementById('fMontos'); if(fmo){fmo.checked=false;onMontosChange(fmo);}
    // Pre-fill pct with sueldos
    var p=currentPcts();
    var pm=document.getElementById('fMixtoPctM'); if(pm)pm.value=Math.round(p.m);
    var ps=document.getElementById('fMixtoPctS'); if(ps)ps.value=Math.round(p.s);
    // Disable main amount field
    var fAmt=document.getElementById('fAmt'); if(fAmt)fAmt.disabled=true;
    syncMixto();
  } else {
    wrap.style.display='none';
    var fAmt=document.getElementById('fAmt'); if(fAmt){fAmt.disabled=false;fAmt.value='';}
    var msg=document.getElementById('mixtoResultMsg'); if(msg)msg.textContent='';
  }
}

function setMixtoSplit(n){
  var c50=document.getElementById('mixtoChip50');
  var cPct=document.getElementById('mixtoChipPct');
  var custom=document.getElementById('mixtoPctCustom');
  if(!c50||!cPct||!custom)return;
  if(n===0){
    c50.className='chip active'; cPct.className='chip';
    custom.style.display='none';
    var pm=document.getElementById('fMixtoPctM'); if(pm)pm.value=50;
    var ps=document.getElementById('fMixtoPctS'); if(ps)ps.value=50;
  } else {
    cPct.className='chip active'; c50.className='chip';
    custom.style.display='flex';
  }
  syncMixto();
}

function syncMixtoPct(who){
  var pm=document.getElementById('fMixtoPctM');
  var ps=document.getElementById('fMixtoPctS');
  if(!pm||!ps)return;
  var val=parseInt(who===0?pm.value:ps.value)||0;
  val=Math.min(100,Math.max(0,val));
  var other=100-val;
  if(who===0){pm.value=val;ps.value=other;}
  else{ps.value=val;pm.value=other;}
  syncMixto();
}

function syncMixto(){
  var mEl=document.getElementById('fMixtoM');
  var sEl=document.getElementById('fMixtoS');
  var pmEl=document.getElementById('fMixtoPctM');
  var psEl=document.getElementById('fMixtoPctS');
  var msg=document.getElementById('mixtoResultMsg');
  var fAmt=document.getElementById('fAmt');
  if(!mEl||!sEl)return;
  var mPago=parseFloat(mEl.value)||0;
  var sPago=parseFloat(sEl.value)||0;
  var total=mPago+sPago;
  var pctM=parseFloat((pmEl||{}).value)||50;
  var pctS=parseFloat((psEl||{}).value)||(100-pctM);
  // Update main amount
  if(fAmt){fAmt.value=total>0?total:'';}
  // Calculate what each should pay
  var mDebe=total*(pctM/100);
  var sDebe=total*(pctS/100);
  var mDif=mPago-mDebe;  // positive = overpaid
  var sDif=sPago-sDebe;
  if(msg&&total>0){
    var fmt2=function(n){return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(Math.abs(n));};
    var lines='Total: <strong>'+fmt2(total)+'</strong> · Acordado: Mauri '+Math.round(pctM)+'% / Sofi '+Math.round(pctS)+'%<br>';
    if(Math.abs(mDif)<1){
      lines+='<span style="color:var(--green)">✓ Están al día</span>';
    } else if(mDif>0){
      lines+='<span style="color:var(--amber)">Sofía le debe a Mauricio <strong>'+fmt2(mDif)+'</strong></span>';
    } else {
      lines+='<span style="color:var(--amber)">Mauricio le debe a Sofía <strong>'+fmt2(sDif)+'</strong></span>';
    }
    msg.innerHTML=lines;
  } else if(msg){msg.innerHTML='';}
}

}
function onManualChange(el){

  if(el.checked){

    var f5=document.getElementById('f5050'); if(f5)f5.checked=false;

function syncPct(who){
  var pm=document.getElementById('fPctM');
  var ps=document.getElementById('fPctS');
  if(!pm||!ps)return;
  var val=parseInt(who===0?pm.value:ps.value)||0;
  val=Math.min(100,Math.max(0,val));
  var other=100-val;
  if(who===0){pm.value=val;ps.value=other;}
  else{ps.value=val;pm.value=other;}
  updatePctMsg();
}
function updatePctMsg(){
  var pm=document.getElementById('fPctM');
  var ps=document.getElementById('fPctS');
  var msg=document.getElementById('pctSumMsg');
  if(!pm||!ps||!msg)return;
  var sum=(parseInt(pm.value)||0)+(parseInt(ps.value)||0);
  if(sum===100){
    msg.textContent='✓ Suma 100%';
    msg.style.color='var(--green)';
  } else {
    msg.textContent='Suma '+sum+'% — debe ser 100%';
    msg.style.color='var(--red)';
  }
}

}

async function saveTxn(){
  const f=ST.form;
  const _fMixtoActive=((document.getElementById('fMixto')||{}).checked||false);
  const _mixtoMval=parseFloat((document.getElementById('fMixtoM')||{}).value||0);
  const _mixtoSval=parseFloat((document.getElementById('fMixtoS')||{}).value||0);
  const amt=_fMixtoActive?(_mixtoMval+_mixtoSval):parseFloat((document.getElementById('fAmt')||{}).value||0);
  const date=((document.getElementById('fDate')||{}).value||'');
  const desc=((document.getElementById('fDesc')||{}).value||'').trim();
  let cuotas=parseInt((document.getElementById('fCuotas')||{}).value||1);
  if(isNaN(cuotas)||cuotas<1)cuotas=1;
  const force5050=((document.getElementById('f5050')||{}).checked||false);
  const forceManual=((document.getElementById('fManual')||{}).checked||false);
  const manualPctM=forceManual?parseInt((document.getElementById('fPctM')||{}).value||0):null;
  const manualPctS=forceManual?parseInt((document.getElementById('fPctS')||{}).value||0):null;
  if(forceManual&&(manualPctM+manualPctS)!==100){toast('Los porcentajes deben sumar 100%','err');return;}
  const forceMontos=((document.getElementById('fMontos')||{}).checked||false);
  const montoM=forceMontos?parseFloat((document.getElementById('fAmtM')||{}).value||0):null;
  const montoS=forceMontos?parseFloat((document.getElementById('fAmtS')||{}).value||0):null;
  if(forceMontos&&(montoM+montoS)<=0){toast('Ingresá los montos por persona','err');return;}
  const forceMixto=_fMixtoActive;
  const mixtoM=forceMixto?_mixtoMval:0;
  const mixtoS=forceMixto?_mixtoSval:0;
  const mixtoPctM=forceMixto?parseFloat((document.getElementById('fMixtoPctM')||{}).value||50):50;
  const mixtoPctS=forceMixto?parseFloat((document.getElementById('fMixtoPctS')||{}).value||50):50;
  if(forceMixto&&(mixtoM+mixtoS)<=0){toast('Ingresá los montos pagados por cada uno','err');return;}

  if(!amt||amt<=0){toast('Ingresá un monto','err');return;}
  if(!date){toast('Seleccioná una fecha','err');return;}

  const isVmIngreso=f.ctx==='villamartin'&&f.vmType==='ingreso';
  if(isVmIngreso){
    const alqCat=cats.find(c=>c.ctx==='villamartin'&&c.type==='ingreso');
    if(alqCat)f.catId=alqCat.id;
  }
  if(!f.catId){toast('Seleccioná una categoría','err');return;}

  const p=currentPcts();
  const btn=document.getElementById('saveTxnBtn');
  const txt=document.getElementById('saveTxnTxt');
  if(btn)btn.disabled=true; if(txt)txt.textContent='Guardando…';

  try{
    const grupoId=crypto.randomUUID();
    outer: for(let i=0;i<cuotas;i++){
      let d=new Date(date+'T12:00:00'); d.setMonth(d.getMonth()+i);
      let rowDate=d.toISOString().split('T')[0];
      let rowDesc=cuotas>1?(desc?`${desc} (Cuota ${i+1}/${cuotas})`:`Cuota ${i+1}/${cuotas}`):desc||null;
      var medioLabels=['debito','efectivo','transferencia','credito'];
      let row={cat_id:f.catId,amt:cuotas>1?amt/cuotas:amt,date:rowDate,descr:rowDesc,type:'gasto',grupo_id:grupoId,medio_pago:f.medioPago!==null?medioLabels[f.medioPago]:null};
      if(f.ctx==='pareja'){
        row.ctx='domestico';
        if(forceMontos){
          // Two rows: each person pays their actual amount, 100% own responsibility
          if(montoM>0){var rM=Object.assign({},row);rM.amt=cuotas>1?(montoM/cuotas):montoM;rM.usuario='Mauricio';rM.p_m=100;rM.p_s=0;await sb.from('movimientos').insert(rM);}
          if(montoS>0){var rS=Object.assign({},row);rS.amt=cuotas>1?(montoS/cuotas):montoS;rS.usuario='Sofia';rS.p_m=0;rS.p_s=100;await sb.from('movimientos').insert(rS);}
          continue outer;
        }
        if(forceMixto){
          // Two rows: each person pays their real amount with the agreed shared %
          // grupo_id prefixed with 'mixto:' so we can identify them as a pair
          var mixtoGrupo='mixto:'+grupoId;
          var mixtoTotal=mixtoM+mixtoS;
          var mixtoDesc=(desc?desc+' — ':'')+'Pago mixto · '+Math.round(mixtoPctM)+'% / '+Math.round(mixtoPctS)+'% · Total: $'+mixtoTotal.toLocaleString('es-AR');
          if(mixtoM>0){
            var rM=Object.assign({},row);
            rM.amt=cuotas>1?(mixtoM/cuotas):mixtoM;
            rM.usuario='Mauricio';rM.p_m=mixtoPctM;rM.p_s=mixtoPctS;
            rM.grupo_id=mixtoGrupo;rM.descr=mixtoDesc;
            await sb.from('movimientos').insert(rM);
          }
          if(mixtoS>0){
            var rS=Object.assign({},row);
            rS.amt=cuotas>1?(mixtoS/cuotas):mixtoS;
            rS.usuario='Sofia';rS.p_m=mixtoPctM;rS.p_s=mixtoPctS;
            rS.grupo_id=mixtoGrupo;rS.descr=mixtoDesc;
            await sb.from('movimientos').insert(rS);
          }
          continue outer;
        }
        row.usuario=f.user;
        row.p_m=forceManual?manualPctM:force5050?50:p.m;
        row.p_s=forceManual?manualPctS:force5050?50:p.s;
      }
      else if(f.ctx==='individual'){row.ctx='domestico';row.usuario=f.user;row.p_m=f.user==='Mauricio'?100:0;row.p_s=f.user==='Sofia'?100:0;}
      else{
        row.ctx='villamartin';row.usuario=f.user||'Mauricio';row.type=f.vmType;row.p_m=50;row.p_s=50;
        if(f.vmType==='ingreso'){
          const huesped=((document.getElementById('fHuesped')||{}).value||'').trim();
          const dni=((document.getElementById('fDni')||{}).value||'').trim();
          if(!huesped){toast('Ingresá el nombre del huésped','err');throw new Error('falta huésped');}
          row.plataforma=f.plataforma||null;
          row.huesped_nombre=huesped||null;
          row.huesped_dni=dni||null;
        }
      }
      await sb.from('movimientos').insert(row);
    }
    toast(cuotas>1?`✓ ${cuotas} cuotas registradas`:'✓ Movimiento registrado');
    ST.form={ctx:null,user:null,vmType:'gasto',catId:null,subCatId:null,plataforma:null,medioPago:null}; ST.showAllCats=false;
    await loadAll();
  }catch(e){console.error('saveTxn error:',e);toast('Error: '+(e.message||JSON.stringify(e)),'err');if(btn)btn.disabled=false;if(txt)txt.textContent='Registrar';}
}

/* ── HISTORY ── */
function renderHist(){
  const filtered=txns.filter(t=>ST.filterCtx==='all'||t.ctx===ST.filterCtx);
  const header='<div class="stitle">Actividad ('+filtered.length+')</div>'
    +'<div class="filtrow">'
    +'<button class="filtbtn'+(ST.filterCtx==='all'?' active':'')+'" onclick="setFilter(0)">Todos</button>'
    +'<button class="filtbtn'+(ST.filterCtx==='domestico'?' active':'')+'" onclick="setFilter(1)">🏠 Doméstico</button>'
    +'<button class="filtbtn'+(ST.filterCtx==='villamartin'?' active':'')+'" onclick="setFilter(2)">🏨 VillaMartín</button>'
    +'</div>';

  var shown=new Set();
  var rows=filtered.map(function(t){
    // ── PAGO MIXTO: combine pair into one card ──
    if(t.grupo_id&&t.grupo_id.startsWith('mixto:')){
      if(shown.has(t.grupo_id)) return '';
      shown.add(t.grupo_id);
      var pair=filtered.filter(function(x){return x.grupo_id===t.grupo_id;});
      var tM=pair.find(function(x){return x.usuario==='Mauricio';})||t;
      var tS=pair.find(function(x){return x.usuario==='Sofia';})||t;
      var cat=cats.find(function(x){return x.id===t.cat_id;});
      var borderColor=(cat&&cat.color&&cat.color.startsWith('#'))?cat.color:'var(--amber)';
      var totAmt=pair.reduce(function(s,x){return s+Number(x.amt);},0);
      var pctM=Number(tM.p_m), pctS=Number(tM.p_s);
      var mDebe=totAmt*(pctM/100);
      var mDif=Number(tM.amt)-mDebe;
      var deudaLine='';
      if(Math.abs(mDif)>1){
        deudaLine=mDif<0
          ?'Mauricio debe <strong>'+fmt(Math.abs(mDif))+'</strong> a Sofía'
          :'Sofía debe <strong>'+fmt(Math.abs(mDif))+'</strong> a Mauricio';
      } else { deudaLine='✓ Están al día'; }
      return '<div class="txnitem" style="border-left:3px solid '+borderColor+'">'
        +'<div class="txnmain"><div class="txninfo">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
        +'<span class="txncat">'+(cat?cat.name:'Sin categoría')+'</span>'
        +'<span style="font-size:10px;background:rgba(251,191,36,.15);color:var(--amber);border:1px solid rgba(251,191,36,.3);border-radius:12px;padding:2px 7px;font-weight:700">Pago mixto</span>'
        +'</div>'
        +(t.descr?'<span class="txndesc">'+t.descr.split(' — ')[0]+'</span>':'')
        +'<span class="txnmeta">'+fmtD(t.date)+' · 🏠 · Acuerdo '+Math.round(pctM)+'% / '+Math.round(pctS)+'%</span>'
        +'<div style="display:flex;gap:12px;margin-top:4px;font-size:11px">'
        +'<span style="color:var(--blue)">Mauri pagó: '+fmt(Number(tM.amt))+'</span>'
        +'<span style="color:var(--pink)">Sofi pagó: '+fmt(Number(tS.amt))+'</span>'
        +'</div>'
        +'<div style="font-size:11px;color:var(--amber);margin-top:2px">'+deudaLine+'</div>'
        +'</div>'
        +'<div class="txnright">'
        +'<span class="txnamt r">−'+fmt(totAmt)+'</span>'
        +'<button class="delbtn" data-gid="'+t.grupo_id+'" onclick="delMixto(this.dataset.gid)">✕</button>'
        +'</div></div></div>';
    }

    // ── NORMAL TRANSACTION ──
    var c=cats.find(function(x){return x.id===t.cat_id;});
    var deudaHtml='';
    if(t.ctx==='domestico'&&t.type==='gasto'){
      var pS=Number(t.amt)*(Number(t.p_s)/100);
      var pM=Number(t.amt)*(Number(t.p_m)/100);
      if(t.usuario==='Mauricio'&&pS>0) deudaHtml=' · <span style="color:var(--amber)">Sofía debe '+fmt(pS)+'</span>';
      else if(t.usuario==='Sofia'&&pM>0) deudaHtml=' · <span style="color:var(--amber)">Mauricio debe '+fmt(pM)+'</span>';
    }
    var borderColor=(c&&c.color&&c.color.startsWith('#'))?c.color:'var(--green)';
    return '<div class="txnitem" style="border-left:3px solid '+borderColor+'">'
      +'<div class="txnmain"><div class="txninfo">'
      +'<span class="txncat">'+(t.type==='compensacion'?'🔄 Compensación':(c?c.name:'Sin categoría'))+'</span>'
      +(t.descr?'<span class="txndesc">'+t.descr+'</span>':'')
      +'<span class="txnmeta">'+fmtD(t.date)+' · '+t.usuario+' · '+(t.ctx==='domestico'?'🏠':'🏨')+deudaHtml+(t.plataforma?' · '+t.plataforma:'')+(t.huesped_nombre?' · '+t.huesped_nombre:'')+(t.medio_pago?' · <span style="color:var(--teal)">'+({'debito':'💳 Déb.','efectivo':'💵 Efec.','transferencia':'🔄 Transf.','credito':'💳 Créd.'}[t.medio_pago]||t.medio_pago)+'</span>':'')+'</span>'
      +'</div>'
      +'<div class="txnright">'
      +'<span class="txnamt '+(t.type==='ingreso'?'g':t.type==='compensacion'?'t':'r')+'">'+(t.type==='ingreso'?'+':t.type==='compensacion'?'±':'−')+fmt(t.amt)+'</span>'
      +'<button class="delbtn" onclick="doDelTxn('+t.id+')">✕</button>'
      +'</div></div></div>';
  }).join('');

  return header+(rows||'<div class="empty">Sin movimientos</div>');
}

function setFilter(n){ST.filterCtx=n===1?'domestico':n===2?'villamartin':'all';render();}
async function delMixto(grupoId){
  if(!confirm('¿Eliminar este pago mixto (ambas partes)?'))return;
  var toDelete=txns.filter(function(t){return t.grupo_id===grupoId;});
  try{
    for(var i=0;i<toDelete.length;i++){await deleteTxn(toDelete[i].id);}
    toast('Pago mixto eliminado');render();
  }catch(e){toast('Error: '+e.message,'err');}
}
async function doDelTxn(id){
  if(!confirm('¿Eliminar este movimiento?'))return;
  try{await deleteTxn(id);toast('Movimiento eliminado');render();}
  catch(e){toast('Error: '+e.message,'err');}
}

/* ── CATEGORIES ── */
function renderCatItem(cat,isSubcat){
  const inUse=txns.some(t=>t.cat_id===cat.id);
  const iconHtml=(cat.color&&cat.color.startsWith('#'))
    ?'<span class="catdot" style="background:'+cat.color+'"></span>'
    :'<span class="caticon">'+(cat.color||'📦')+'</span>';
  // Render subcategories nested below
  const subCats=isSubcat?[]:cats.filter(function(x){return x.parent_id===cat.id;});
  const subHtml=subCats.map(function(sc){return renderCatItem(sc,true);}).join('');
  return'<div>'
    +'<div class="catitem"'+(isSubcat?' style="padding-left:28px;border-left:2px solid var(--border);margin-left:12px"':'')+'>'
    +iconHtml
    +'<span class="catname">'+cat.name+'</span>'
    +'<span class="catbadge '+cat.type+'">'+cat.type+'</span>'
    +(inUse?'<span class="catused">en uso</span>':'<button class="delbtn" onclick="doDelCat('+cat.id+')">✕</button>')
    +'</div>'
    +subHtml
    +'</div>';
}

function renderCats(){
  const dom=cats.filter(x=>x.ctx==='domestico'&&!x.parent_id);
  const vm=cats.filter(x=>x.ctx==='villamartin'&&!x.parent_id);
  const isVM=ST.catFormCtx==='villamartin';
  const isIngreso=ST.catFormType==='ingreso';

  const tipoRow=isVM
    ?'<button class="chip active" style="pointer-events:none;opacity:.8">Gasto</button>'
    :'<div class="chip-grid">'
      +'<button class="chip'+(!isIngreso?' active':'')+'" onclick="catSetType(0)">Gasto</button>'
      +'<button class="chip'+(isIngreso?' active':'')+'" onclick="catSetType(1)">Ingreso</button>'
      +'</div>';

  const emojiGrid=EMOJIS.map((e,i)=>'<button class="emoji-btn'+(ST.catFormIcon===e?' active':'')+'" onclick="catSetIcon('+i+')">' +e+'</button>').join('');

  return''
    +'<div class="addcatform">'
    +'<input type="hidden" id="hidCtx" value="'+(isVM?'villamartin':'domestico')+'">'
    +'<input type="hidden" id="hidType" value="'+(isVM?'gasto':(isIngreso?'ingreso':'gasto'))+'">'
    +'<input type="hidden" id="hidIcon" value="'+ST.catFormIcon+'">'
    +(function(){
      // Parent selector — only show categories of same ctx
      var parentOpts='<option value="">Sin grupo (categoría suelta)</option>'
        +grupos.map(function(g){
          return'<option value="'+g.id+'"'+(ST.catFormParent===g.id?' selected':'')+'>'+
            (g.icono?g.icono+' ':'')+g.nombre+'</option>';
        }).join('');
      return'<input class="finput" type="text" id="cName" placeholder="Nombre de la categoría">'
        +'<div class="flabel" style="margin-top:4px">Grupo (categoria)</div>'
        +'<select class="fselect" id="cParent" onchange="ST.catFormParent=this.value?parseInt(this.value):null;renderCatsInPlace()">'+parentOpts+'</select>';
    })()
    +'<div class="flabel" style="margin-top:6px">Contexto</div>'
    +'<div class="chip-grid">'
    +'<button class="chip'+(!isVM?' active':'')+'" onclick="catSetCtx(0)">🏠 Doméstico</button>'
    +'<button class="chip'+(isVM?' active':'')+'" onclick="catSetCtx(1)">🏨 VillaMartín</button>'
    +'</div>'
    +'<div class="flabel" style="margin-top:4px">Tipo</div>'
    +tipoRow
    +'<div class="flabel" style="margin-top:8px">Ícono</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'
    +'<div class="emoji-preview">'+ST.catFormIcon+'</div>'
    +'<span class="mlabel">Seleccionado</span>'
    +'</div>'
    +'<div class="emoji-grid">'+emojiGrid+'</div>'
    +'<button class="btnprimary" onclick="doAddCat()" style="margin-top:10px">+ Agregar</button>'
    +'</div>'
    +(function(){
      // Show subcategorias grouped under their categoria
      var domGroups='';
      grupos.forEach(function(g){
        var subs=cats.filter(function(x){return x.ctx==='domestico'&&x.parent_id===g.id;});
        if(subs.length>0){
          domGroups+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 14px 2px">'+(g.icono?g.icono+' ':'')+g.nombre+'</div>'
            +subs.map(function(s){return renderCatItem(s,true);}).join('');
        }
      });
      // Also show orphan subcategorias (no parent categoria)
      var orphans=cats.filter(function(x){return x.ctx==='domestico'&&!x.parent_id;});
      if(orphans.length>0){
        domGroups+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 14px 2px">Sin grupo</div>'
          +orphans.map(function(s){return renderCatItem(s,false);}).join('');
      }
      var vmGroups='';
      var vmAll=cats.filter(function(x){return x.ctx==='villamartin';});
      vmGroups=vmAll.map(function(s){return renderCatItem(s,false);}).join('');
      return'<div class="stitle2">🏠 Doméstico ('+cats.filter(x=>x.ctx==='domestico').length+')</div>'
        +domGroups
        +'<div class="stitle2" style="margin-top:8px">🏨 VillaMartín ('+vmAll.length+')</div>'
        +vmGroups;
    })();
}

function renderCatsInPlace(){const el=document.querySelector('.content');if(el)el.innerHTML=renderSettings();}
function catSetCtx(n){ST.catFormCtx=(n===1)?'villamartin':'domestico';ST.catFormType='gasto';ST.catFormParent=null;renderCatsInPlace();}
function catSetType(n){ST.catFormType=(n===1)?'ingreso':'gasto';renderCatsInPlace();}
function catSetIcon(i){ST.catFormIcon=EMOJIS[i]||'📦';renderCatsInPlace();}

async function doAddCat(){
  const name=((document.getElementById('cName')||{}).value||'').trim();
  if(!name){toast('Ingresá un nombre','err');return;}
  const ctxRaw=((document.getElementById('hidCtx')||{}).value||'');
  const ctx=(ctxRaw==='villamartin')?'villamartin':'domestico';
  const typeRaw=((document.getElementById('hidType')||{}).value||'');
  const type=(typeRaw==='ingreso')?'ingreso':'gasto';
  const icon=((document.getElementById('hidIcon')||{}).value||ST.catFormIcon||'📦');
  if(cats.some(c=>c.name.toLowerCase()===name.toLowerCase()&&c.ctx===ctx)){
    toast('⚠ Ya existe una categoría con ese nombre','err');return;
  }
  const btn=document.querySelector('.addcatform .btnprimary');
  if(btn)btn.disabled=true;
  try{
    await insertCat({name,type,ctx,color:icon,parent_id:ST.catFormParent||null});
    toast('✓ Categoría creada');
    ST.catFormCtx='domestico';ST.catFormType='gasto';ST.catFormIcon='🛒';ST.catFormParent=null;
    render();
  }catch(e){
    toast('Error: '+e.message,'err');
    if(btn)btn.disabled=false;
  }
}

async function doDelCat(id){
  if(txns.some(t=>t.cat_id===id)){toast('No se puede: tiene movimientos asociados','err');return;}
  if(!confirm('¿Eliminar esta categoría?'))return;
  try{await deleteCat(id);toast('Categoría eliminada');render();}
  catch(e){toast('Error: '+e.message,'err');}
}

/* ── REPORT ── */
function renderReport(){
  const allMonths=[...new Set(txns.map(t=>t.date.substring(0,7)))].sort().reverse();
  if(!allMonths.length) return '<div class="empty" style="margin-top:40px">Sin movimientos registrados</div>';

  const selMes=ST.reportMes||allMonths[0];
  const selCtx=ST.reportCtx||'domestico';
  const selCat=ST.reportCat||'todas';

  const mesOpts=allMonths.map(m=>{
    const[y,mo]=m.split('-');
    const label=new Date(y,mo-1,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
    return'<option value="'+m+'"'+(m===selMes?' selected':'')+'>'+label+'</option>';
  }).join('');

  const ctxChips='<button class="chip'+(selCtx==='domestico'?' active':'')+'" onclick="setReportCtx(0)">🏠 Doméstico</button>'
    +'<button class="chip'+(selCtx==='villamartin'?' active':'')+'" onclick="setReportCtx(1)">🏨 VillaMartín</button>';

  const filtered=txns.filter(t=>
    t.date.startsWith(selMes)&&t.ctx===selCtx&&
    (t.type==='gasto'||(t.ctx==='villamartin'&&t.type==='ingreso'))
  );

  const catNames=[...new Set(filtered.map(t=>{const c=cats.find(x=>x.id===t.cat_id);return c?c.name:'Sin categoría';}))];
  const catChips='<button class="chip'+(selCat==='todas'?' active':'')+'" onclick="setReportCat(-1)">Todas</button>'
    +catNames.map((n,i)=>'<button class="chip'+(selCat===n?' active':'')+'" onclick="setReportCat('+i+')">'+n+'</button>').join('');

  const rows=filtered.filter(t=>{
    if(selCat==='todas') return true;
    const c=cats.find(x=>x.id===t.cat_id); return(c?c.name:'Sin categoría')===selCat;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalGas=rows.filter(t=>t.type==='gasto').reduce((s,t)=>s+Number(t.amt),0);
  const totalIng=rows.filter(t=>t.type==='ingreso').reduce((s,t)=>s+Number(t.amt),0);

  // Build category totals for chart
  const byCat={};
  rows.forEach(t=>{
    const c=cats.find(x=>x.id===t.cat_id);
    const k=c?c.name:'Sin categoría';
    if(!byCat[k])byCat[k]={total:0,type:t.type};
    byCat[k].total+=Number(t.amt);
  });
  const sortedCats=Object.entries(byCat).sort((a,b)=>b[1].total-a[1].total);

  const catSummary=sortedCats.map(([n,v])=>
    '<div class="lgitem">'
    +'<span class="lgname">'+n+'</span>'
    +'<span class="lgamt '+(v.type==='ingreso'?'g':'r')+'" style="font-size:13px;font-weight:800">'+fmt(v.total)+'</span>'
    +'</div>'
  ).join('');

  // Chart data as JSON for post-render
  const chartData=JSON.stringify({
    labels: sortedCats.map(([n])=>n),
    values: sortedCats.map(([,v])=>v.total),
    types:  sortedCats.map(([,v])=>v.type),
  });

  setTimeout(function(){
    var el=document.getElementById('reportChart');
    if(!el||!window.Chart)return;
    if(window._reportChart)window._reportChart.destroy();
    var parsed=JSON.parse(el.dataset.chart);
    var colors=parsed.types.map(function(t){return t==='ingreso'?'#4ade80':'#60a5fa';});
    window._reportChart=new Chart(el,{
      type:'bar',
      data:{
        labels:parsed.labels,
        datasets:[{
          data:parsed.values,
          backgroundColor:colors,
          borderRadius:6,
          borderSkipped:false,
        }]
      },
      options:{
        responsive:false,
        plugins:{legend:{display:false},
          tooltip:{callbacks:{label:function(ctx){return' '+new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(ctx.raw);}}}},
        scales:{
          x:{ticks:{color:'#7daa88',font:{size:11}},grid:{display:false}},
          y:{ticks:{color:'#7daa88',font:{size:10},callback:function(v){return v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v;}},grid:{color:'rgba(74,222,128,.08)'}}
        }
      }
    });
  },80);

  return'<div class="stitle">Reporte</div>'
    +'<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px">'
    +'<div class="flabel">Mes</div>'
    +'<select class="fselect" id="rMes" onchange="ST.reportMes=this.value;render()">'+mesOpts+'</select>'
    +'<div class="flabel" style="margin-top:2px">Contexto</div>'
    +'<div class="chip-grid">'+ctxChips+'</div>'
    +'<div class="flabel" style="margin-top:2px">Categoría</div>'
    +'<div class="chip-grid">'+catChips+'</div>'
    +'</div>'
    +'<div class="mgrid">'
    +(selCtx==='villamartin'
      ?'<div class="mc"><div class="mlabel">Ingresos</div><div class="mval g">'+fmt(totalIng)+'</div></div>'
       +'<div class="mc"><div class="mlabel">Gastos</div><div class="mval r">'+fmt(totalGas)+'</div></div>'
      :'<div class="mc wide"><div class="mlabel">Total gastos</div><div class="mval r">'+fmt(totalGas)+'</div></div>')
    +'</div>'
    +(sortedCats.length>0
      ? '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px">'
        +'<div style="position:relative;height:'+(Math.max(sortedCats.length*44+60,180))+'px">'
        +'<canvas id="reportChart" data-chart=\''+chartData+'\' style="width:100%;height:100%"></canvas>'
        +'</div></div>'
              : '<div class="empty">Sin gastos para este filtro</div>');
}
function setReportCtx(n){ST.reportCtx=(n===1)?'villamartin':'domestico';ST.reportCat='todas';render();}
function setReportCat(i){
  var selMes=ST.reportMes||(today().substring(0,7));
  var selCtx=ST.reportCtx||'domestico';
  var filtered=txns.filter(function(t){return t.date.startsWith(selMes)&&t.ctx===selCtx&&(t.type==='gasto'||(t.ctx==='villamartin'&&t.type==='ingreso'));});
  var catNames=[...new Set(filtered.map(function(t){var c=cats.find(function(x){return x.id===t.cat_id;});return c?c.name:'Sin categoría';}))];
  ST.reportCat=(i===-1)?'todas':(catNames[i]||'todas');
  render();
}

  </div>`;
}

async function doSaveSal(){
  const m=parseFloat(document.getElementById('sM').value);
  const s=parseFloat(document.getElementById('sS').value);
  const d=document.getElementById('sD').value;
  if(!m||!s||!d){toast('Completá todos los campos','err');return;}
  try{await insertSal({m,s,date:d});toast('✓ Sueldos registrados');render();}
  catch(e){toast('Error: '+e.message,'err');}
}

function doDisconnect(){
  if(!confirm('¿Desconectar? Los datos en Supabase se conservan.'))return;
  localStorage.removeItem('sb_url');localStorage.removeItem('sb_key');
  sb=null;cats=[];txns=[];sals=[];render();
}

/* ── EXPORT ── */
function exportXLSX(){
  const wb=XLSX.utils.book_new();
  const rows=txns.map(t=>{const c=cats.find(x=>x.id===t.cat_id);
    return{Fecha:t.date,Tipo:t.type,Contexto:t.ctx,Usuario:t.usuario,
      Monto:Number(t.amt),Categoría:c?c.name:'',Descripción:t.descr||'',
      Plataforma:t.plataforma||'',Huésped:t.huesped_nombre||'',DNI:t.huesped_dni||'',
      'Pct Mauricio':Number(t.p_m).toFixed(1),'Pct Sofía':Number(t.p_s).toFixed(1)};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Movimientos');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(
    sals.map(s=>({Fecha:s.date,'Sueldo Mauricio':Number(s.m),'Sueldo Sofía':Number(s.s),Total:Number(s.m)+Number(s.s)}))),
    'Sueldos');
  XLSX.writeFile(wb,'FinanzasApp_Export.xlsx');
}

/* ── INIT ── */
function setTab(t){ST.tab=t;render();}

(async()=>{
  const url=localStorage.getItem('sb_url');
  const key=localStorage.getItem('sb_key');
  if(url&&key){initSupabase(url,key);await loadAll();}
  else render();
})();

/* ── PWA ── */
var _pwaDeferredPrompt=null;

window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  _pwaDeferredPrompt=e;
  /* Don't show if user dismissed before */
  if(!localStorage.getItem('pwa_dismissed')){
    setTimeout(function(){
      var b=document.getElementById('pwa-banner');
      if(b)b.classList.add('show');
    },2000);
  }
});

window.addEventListener('appinstalled',function(){
  _pwaDeferredPrompt=null;
  var b=document.getElementById('pwa-banner');
  if(b)b.classList.remove('show');
  toast('✓ App instalada en tu pantalla de inicio');
});

function pwaInstall(){
  if(!_pwaDeferredPrompt)return;
  _pwaDeferredPrompt.prompt();
  _pwaDeferredPrompt.userChoice.then(function(r){
    if(r.outcome==='accepted') toast('✓ Instalando...');
    _pwaDeferredPrompt=null;
    var b=document.getElementById('pwa-banner');
    if(b)b.classList.remove('show');
  });
}

function pwaDismiss(){
  localStorage.setItem('pwa_dismissed','1');
  var b=document.getElementById('pwa-banner');
  if(b)b.classList.remove('show');
}

/* Register Service Worker */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      console.log('SW registered:', reg.scope);
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            toast('Nueva versión disponible — recargá la app');
          }
        });
      });
    }).catch(function(err){
      console.warn('SW registration failed:',err);
    });
  });
}
